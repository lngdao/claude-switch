name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run only (no publish)'
        required: false
        default: 'false'
      provenance:
        description: 'Sign with provenance (requires npm trusted publisher configured)'
        required: false
        default: 'false'

jobs:
  publish:
    name: Build, test & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub Release
      id-token: write   # required for npm provenance via OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set"
            exit 1
          fi
          # Print masked diagnostic so we can verify the token shape without
          # leaking it (GH already masks the literal value).
          echo "Token length: ${#NPM_TOKEN}"
          echo "Token prefix: ${NPM_TOKEN:0:4}…"

          # Write .npmrc manually so we control exactly what auth is used.
          # setup-node's auto-generated .npmrc has been observed to 404 with
          # granular tokens on scoped packages — writing it ourselves matches
          # the format that works locally.
          {
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN"
            printf 'registry=https://registry.npmjs.org/\n'
            printf 'always-auth=true\n'
          } > "$HOME/.npmrc"
          chmod 600 "$HOME/.npmrc"

          echo "npm whoami:"
          npm whoami

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run == 'true'
        run: |
          if [ "${{ github.event.inputs.provenance }}" = "true" ]; then
            npm publish --provenance --access public --dry-run
          else
            npm publish --access public --dry-run
          fi

      - name: Publish to npm
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run != 'true')
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.provenance }}" = "true" ]; then
            npm publish --provenance --access public
          else
            npm publish --access public
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
